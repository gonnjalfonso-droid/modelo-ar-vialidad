<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modelo 3D - Cátedra de Vialidad</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .contenedor {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      margin-top: 0;
      line-height: 1.5;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      background: #e9e9e9;
      border-radius: 12px;
    }

    .nota {
      margin-top: 14px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Modelo 3D interactivo</h1>
    <p>
      Visualización 3D del elemento vial. Podés rotar el modelo, hacer zoom y abrirlo en realidad aumentada desde el botón correspondiente.
    </p>

    <model-viewer
      src="modelo.glb"
      alt="Modelo 3D"
      ar
      ar-modes="scene-viewer quick-look webxr"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      ar-scale="fixed"
      ar-placement="floor">
    </model-viewer>

    <p class="nota">
      En Android debería abrir Scene Viewer. En iPhone/iPad debería abrir Quick Look.
    </p>
  </div>
</body>
</html>
